<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenrollalo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Desenrollalo</h1>
        <p>Cronómetro y alertas para el revelado de películas 35mm y 120mm</p>
      </div>
      <button class="theme-toggle" aria-label="Cambiar tema" title="Click para cambiar entre tema claro y oscuro">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="timer">
      <h2>Cronómetro de revelado</h2>
      <div class="timer-display">
        <span class="minutes">00</span>:<span class="seconds">00</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
      <div class="timer-controls">
        <button class="start">Iniciar</button>
        <button class="stop">Parar</button>
        <button class="reset">Reiniciar</button>
      </div>
    </section>

    <section class="calculator">
      <h2>Calculadora de revelados</h2>
      <form class="calculator-form">
        <div class="form-group">
          <label for="film-type">Tipo de película:</label>
          <select id="film-type" name="film-type" title="35mm: Formato estándar | 120mm: Formato medio">
            <option value="35mm">35mm</option>
            <option value="120mm">120mm</option>
          </select>
        </div>
        <div class="form-group">
          <label for="developer">Revelador:</label>
          <select id="developer" name="developer" title="C-41: Para película color | D-76: Para blanco y negro">
            <option value="c41">C-41 (color)</option>
            <option value="d76">D-76 (B&W)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="rolls">Número de rollos:</label>
          <input type="number" id="rolls" name="rolls" min="1" value="1">
        </div>
        <button type="button" class="calculate">Calcular</button>
      </form>
      <div class="result"></div>
    </section>

    <section class="alerts">
      <h2>Alertas sonoras</h2>
      <div class="alert-controls">
        <button class="enable-alerts">Activar alertas</button>
        <button class="disable-alerts">Desactivar alertas</button>
      </div>
      <div class="alert-preview">
        <audio id="alert-sound" src="assets/alert.mp3"></audio>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Desenrollalo. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
