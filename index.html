<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenrollalo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Desenrollalo</h1>
    <p>Cronómetro y alertas para el revelado de películas 35mm y 120mm</p>
  </header>

  <main>
    <section class="timer">
      <h2>Cronómetro de revelado</h2>
      <div class="timer-display">
        <span class="minutes">00</span>:<span class="seconds">00</span>
      </div>
      <div class="timer-controls">
        <button class="start">Iniciar</button>
        <button class="stop">Parar</button>
        <button class="reset">Reiniciar</button>
      </div>
    </section>

    <section class="calculator">
      <h2>Calculadora de revelados</h2>
      <!-- calculator UI goes here -->
    </section>

    <section class="alerts">
      <h2>Alertas sonoras</h2>
      <!-- alerts UI goes here -->
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Desenrollalo. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
