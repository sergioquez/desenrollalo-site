<!DOCTYPE html>
<html>
<head>
    <title>Test Fix</title>
    <style>
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #222;
            border-radius: 4px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #ff3b3b;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>Test Progress Bar</h1>
    <div class="progress-container">
        <div class="progress-bar" id="testBar"></div>
    </div>
    <button onclick="testProgress()">Test Progress</button>
    
    <script>
        function testProgress() {
            const bar = document.getElementById('testBar');
            let width = 0;
            const interval = setInterval(() => {
                width += 10;
                bar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(interval);
                    alert('Progress complete!');
                }
            }, 200);
        }
        
        // Test DEVELOPMENT_TIMES access
        const DEVELOPMENT_TIMES = {
            '35mm': { 'c41': 15, 'd76': 10 },
            '120mm': { 'c41': 20, 'd76': 12 }
        };
        
        function testCalculation() {
            const time = DEVELOPMENT_TIMES['35mm']['c41'];
            console.log('Test calculation:', time, 'minutes');
            return time;
        }
        
        console.log('Development times test:', testCalculation());
        console.log('Test page loaded successfully');
    </script>
</body>
</html>
