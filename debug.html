<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Desenrollalo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .debug-title { margin-bottom: 10px; color: #333; }
        .debug-list { list-style: none; }
        .debug-list li { padding: 8px 0; border-bottom: 1px solid #eee; }
        .debug-list li:last-child { border-bottom: none; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status.ok { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.warning { background: #fef3c7; color: #92400e; }
        .test-button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .test-button:hover { background: #2563eb; }
        #console { background: #1f2937; color: #f9fafb; padding: 15px; border-radius: 6px; margin-top: 20px; font-family: monospace; font-size: 14px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>🔧 Debug - Desenrollalo Rediseño</h1>
    
    <div class="debug-section">
        <h2 class="debug-title">📁 Archivos Cargados</h2>
        <ul class="debug-list" id="filesList">
            <!-- Se llenará con JavaScript -->
        </ul>
    </div>
    
    <div class="debug-section">
        <h2 class="debug-title">🎯 Funcionalidades</h2>
        <button class="test-button" onclick="testCSS()">Probar CSS</button>
        <button class="test-button" onclick="testJS()">Probar JavaScript</button>
        <button class="test-button" onclick="testLocalStorage()">Probar LocalStorage</button>
        <button class="test-button" onclick="testTheme()">Probar Theme Toggle</button>
    </div>
    
    <div class="debug-section">
        <h2 class="debug-title">📱 Responsive</h2>
        <div>Viewport: <span id="viewportInfo"></span></div>
        <div>Touch: <span id="touchInfo"></span></div>
        <div>Pixel Ratio: <span id="pixelRatio"></span></div>
    </div>
    
    <div class="debug-section">
        <h2 class="debug-title">📊 Console Log</h2>
        <div id="console">Esperando logs...</div>
    </div>
    
    <div class="debug-section">
        <h2 class="debug-title">🔗 Enlaces</h2>
        <p>
            <a href="redesign-v2.html" target="_blank">Rediseño v2.0</a> |
            <a href="test-redesign.html" target="_blank">Test Suite</a> |
            <a href="index.html" target="_blank">Versión Original</a>
        </p>
    </div>
    
    <script>
        // Capturar console.log
        const originalLog = console.log;
        const originalError = console.error;
        const consoleDiv = document.getElementById('console');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleDiv.innerHTML += '[LOG] ' + args.join(' ') + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            consoleDiv.innerHTML += '[ERROR] ' + args.join(' ') + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };
        
        // Verificar archivos
        function checkFile(url, type) {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();
                xhr.open('HEAD', url);
                xhr.onload = () => resolve({ url, type, status: xhr.status, ok: xhr.status === 200 });
                xhr.onerror = () => resolve({ url, type, status: 0, ok: false });
                xhr.send();
            });
        }
        
        async function checkFiles() {
            const files = [
                { url: 'redesign-v2.css', type: 'CSS' },
                { url: 'redesign-v2.js', type: 'JavaScript' },
                { url: 'redesign-v2.html', type: 'HTML' }
            ];
            
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            
            for (const file of files) {
                const result = await checkFile(file.url, file.type);
                const li = document.createElement('li');
                li.innerHTML = `
                    ${file.type}: <strong>${file.url}</strong>
                    <span class="status ${result.ok ? 'ok' : 'error'}">
                        ${result.ok ? '✓ OK' : `✗ Error ${result.status}`}
                    </span>
                `;
                list.appendChild(li);
                
                console.log(`${file.type} ${file.url}: ${result.ok ? 'OK' : 'ERROR'}`);
            }
        }
        
        // Test CSS
        function testCSS() {
            const hasCSS = document.styleSheets.length > 0;
            console.log(`CSS cargado: ${hasCSS ? 'Sí' : 'No'}`);
            
            if (hasCSS) {
                console.log(`Hojas de estilo: ${document.styleSheets.length}`);
                for (let i = 0; i < document.styleSheets.length; i++) {
                    console.log(`  - ${document.styleSheets[i].href || 'inline'}`);
                }
            }
        }
        
        // Test JavaScript
        function testJS() {
            console.log('Testing JavaScript...');
            
            // Verificar si FilmDevelopmentApp existe
            if (typeof FilmDevelopmentApp === 'function') {
                console.log('✓ FilmDevelopmentApp class disponible');
            } else {
                console.log('✗ FilmDevelopmentApp NO disponible');
            }
            
            // Verificar eventos
            console.log('Document readyState:', document.readyState);
            console.log('Window loaded:', window.loaded);
        }
        
        // Test LocalStorage
        function testLocalStorage() {
            try {
                localStorage.setItem('test', 'ok');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');
                console.log(`LocalStorage: ${value === 'ok' ? '✓ Funcionando' : '✗ Error'}`);
            } catch (e) {
                console.log('✗ LocalStorage error:', e.message);
            }
        }
        
        // Test Theme
        function testTheme() {
            const currentTheme = localStorage.getItem('theme') || 'system';
            console.log(`Theme actual: ${currentTheme}`);
            
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            console.log(`Sistema prefiere dark: ${prefersDark}`);
        }
        
        // Info responsive
        function updateResponsiveInfo() {
            document.getElementById('viewportInfo').textContent = 
                `${window.innerWidth} × ${window.innerHeight}px`;
            document.getElementById('touchInfo').textContent = 
                'ontouchstart' in window ? 'Sí' : 'No';
            document.getElementById('pixelRatio').textContent = 
                window.devicePixelRatio;
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔧 Debug inicializado');
            checkFiles();
            updateResponsiveInfo();
            window.addEventListener('resize', updateResponsiveInfo);
            
            // Auto-test básico
            setTimeout(() => {
                testCSS();
                testLocalStorage();
                testTheme();
            }, 1000);
        });
        
        // Error handling global
        window.addEventListener('error', (e) => {
            console.error('Error global:', e.message, e.filename, e.lineno);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Promise rechazada:', e.reason);
        });
    </script>
</body>
</html>
